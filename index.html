<!DOCTYPE html>
<html lang="en">

<title>Strands</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&display=swap');
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --bg: #f5f0e8; --ink: #1a1208; --mid: #6b5f4a; --faint: #e0d8c8; --accent: #c8440a; --accent2: #2a6b4a; --card: #faf7f0; --subcard: #f0ebe0; --shadow: rgba(26,18,8,0.12); --radius: 4px; --transition: 0.22s cubic-bezier(0.4,0,0.2,1); }

body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events: none; z-index: 1000; opacity: 0.6; }
header { padding: 14px 16px 0; padding-top: calc(14px + env(safe-area-inset-top)); background: var(--bg); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--faint); }
.header-top { display: flex; align-items: center; margin-bottom: 12px; }

.add-btn { margin-left: auto; font-family: 'DM Mono', monospace; font-size: 0.68rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; background: var(--ink); color: var(--bg); border: none; padding: 7px 13px; cursor: pointer; border-radius: var(--radius); flex-shrink: 0; }

.edit-panel textarea { resize: vertical; min-height: 50px; }
.edit-color-options { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 5px; }

.edit-actions { display: flex; gap: 8px; margin-top: 12px; }

.tab-pane.active { display: block; }
.todos { list-style: none; margin-top: 10px; }
.todo-item { display: flex; align-items: flex-start; gap: 6px; padding: 8px 0; border-bottom: 1px solid var(--faint); font-size: 0.75rem; line-height: 1.4; touch-action: none; }

.todo-check:checked { background: var(--accent2); border-color: var(--accent2); }

.substrand { background: var(--subcard); border: 1px solid var(--faint); border-radius: var(--radius); overflow: hidden; position: relative; }
.substrand.open { grid-column: 1 / -1; }
.substrand-accent { height: 2px; }
.substrand-header { padding: 9px; cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent; display: flex; align-items: center; justify-content: space-between; }
.substrand-title { font-family: 'Libre Baskerville', serif; font-weight: 700; font-size: 0.78rem; line-height: 1.3; margin-bottom: 2px; }
.substrand-meta { font-size: 0.62rem; color: var(--mid); }
.substrand-chevron { font-size: 0.72rem; color: var(--mid); transition: transform 0.2s; flex-shrink: 0; margin-left: 6px; }
.substrand.open .substrand-chevron { transform: rotate(90deg); }
.substrand-body { display: none; padding: 0 9px 9px; border-top: 1px solid var(--faint); }
.substrand.open .substrand-body { display: block; }
.substrand-todos { list-style: none; margin-top: 7px; }
.substrand-todo { display: flex; align-items: flex-start; gap: 6px; padding: 7px 0; border-bottom: 1px solid var(--faint); font-size: 0.7rem; line-height: 1.4; touch-action: none; }
.substrand-todo:last-child { border-bottom: none; }
.substrand-todo.todo-dragging { opacity: 0.35; }
.substrand-todo.todo-over { box-shadow: 0 -2px 0 var(--accent); }
.substrand-todo .todo-grip { margin-top: 1px; }
.substrand-todo .todo-check { width: 15px; height: 15px; }
.substrand-todo .todo-check:checked::after { left: 2px; top: 0; width: 4px; height: 8px; }
.substrand-add { display: flex; gap: 6px; margin-top: 8px; }
.substrand-add input { flex: 1; font-family: 'DM Mono', monospace; font-size: 16px; background: var(--bg); border: 1px solid transparent; border-radius: var(--radius); padding: 7px 8px; color: var(--ink); outline: none; }
.substrand-add input::placeholder { color: var(--mid); opacity: 0.6; }
.substrand-add button { font-family: 'DM Mono', monospace; font-size: 0.65rem; background: var(--ink); color: var(--bg); border: none; padding: 7px 10px; border-radius: var(--radius); cursor: pointer; }
.substrand-add button:active { background: var(--accent); }
.substrand-del-row { display: flex; justify-content: flex-end; margin-top: 8px; padding-top: 7px; border-top: 1px solid var(--faint); }
.substrand-del-btn { font-family: 'DM Mono', monospace; font-size: 0.62rem; letter-spacing: 0.06em; text-transform: uppercase; background: none; border: 1px solid var(--faint); color: var(--mid); padding: 5px 10px; border-radius: var(--radius); cursor: pointer; }
.substrand-del-btn:active { border-color: var(--accent); color: var(--accent); }
.add-substrand-btn { grid-column: 1 / -1; font-family: 'DM Mono', monospace; font-size: 0.65rem; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; background: none; border: 1px dashed var(--faint); color: var(--mid); padding: 9px; border-radius: var(--radius); cursor: pointer; width: 100%; }
.add-substrand-btn:active { border-color: var(--mid); background: var(--faint); }

.new-substrand-form.visible { display: block; }
.new-substrand-form input { width: 100%; font-family: 'DM Mono', monospace; font-size: 16px; background: var(--bg); border: 1px solid var(--faint); border-radius: var(--radius); padding: 8px 9px; color: var(--ink); outline: none; margin-bottom: 8px; }
.new-substrand-form input::placeholder { color: var(--mid); opacity: 0.6; }
.form-row { display: flex; gap: 7px; }
.form-row button { font-family: 'DM Mono', monospace; font-size: 0.68rem; padding: 7px 14px; border: none; border-radius: var(--radius); cursor: pointer; }
.btn-confirm { background: var(--ink); color: var(--bg); }
.btn-confirm:active { background: var(--accent); }
.btn-cancel-sm { background: var(--faint); color: var(--ink); }
.strand-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 14px; padding-top: 10px; border-top: 1px solid var(--faint); }
.strand-edit-btn { font-family: 'DM Mono', monospace; font-size: 0.62rem; letter-spacing: 0.06em; text-transform: uppercase; background: none; border: 1px solid var(--faint); color: var(--mid); padding: 6px 12px; border-radius: var(--radius); cursor: pointer; }
.strand-edit-btn:active { border-color: var(--mid); color: var(--ink); }
.strand-delete-btn { font-family: 'DM Mono', monospace; font-size: 0.62rem; letter-spacing: 0.06em; text-transform: uppercase; background: none; border: 1px solid var(--faint); color: var(--mid); padding: 6px 12px; border-radius: var(--radius); cursor: pointer; }
.strand-delete-btn:active { border-color: var(--accent); color: var(--accent); }
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(26,18,8,0.5); z-index: 500; backdrop-filter: blur(2px); align-items: flex-end; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: var(--card); border-radius: var(--radius) var(--radius) 0 0; padding: 24px 20px; padding-bottom: calc(24px + env(safe-area-inset-bottom)); width: 100%; max-height: 90vh; overflow-y: auto; }

.color-options { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 6px; }

<body>
<header>
<div class="header-top">
<h1><span>Strands</span></h1>
<button class="add-btn" id="add-btn" onclick="openModal()">+ New</button>
</div>
<nav class="nav-tabs">
<button class="nav-tab active" id="tab-strands" onclick="showView('strands')">Strands</button>
<button class="nav-tab" id="tab-today" onclick="showView('today')">Today <span class="badge" id="today-badge" style="display:none"></span></button>
</nav>
</header>
<div class="view active" id="view-strands">
<div class="canvas" id="canvas"></div>
</div>
<div class="view" id="view-today">
<div class="today-view">
<div class="today-date" id="today-date"></div>
<div id="today-content"></div>
</div>
</div>
<div class="modal-overlay" id="modal" onclick="closeModalOnOverlay(event)">
<div class="modal">
<h2>New strand</h2>
<label>Title</label>
<input type="text" id="m-title" placeholder="e.g. Chai concentrate">
<label>Description</label>
<textarea id="m-desc" placeholder="What is this strand about?"></textarea>
<label>Category</label>
<input type="text" id="m-tag" placeholder="e.g. Harth / CIMA / Personal">
<label>Status</label>
<select id="m-status">
<option value="active">Active</option>
<option value="paused">Paused</option>
<option value="blocked">Blocked</option>
</select>
<label>Colour</label>
<div class="color-options" id="color-options"></div>
<div class="modal-actions">
<button class="btn-primary" onclick="createStrand()">Create</button>
<button class="btn-secondary" onclick="closeModal()">Cancel</button>
</div>
</div>
</div>
<script>
const COLORS=['#c8440a','#2a6b4a','#2a4a8a','#8a2a6b','#6b4a2a','#1a6b6b','#8a6b2a','#4a2a8a','#6b2a2a','#2a6b2a'];
const STORAGE_KEY='strands-data-v2';
let selectedColor=COLORS[0];
let _id=200;
const uid=()=>_id++;
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
let todayList=[];
let currentView='strands';

{id:1,title:'Chai Concentrate',tag:'Harth',status:'active',desc:'pH, Brix, packaging, supplier sourcing',color:COLORS[0],open:false,activeTab:'tasks',todos:[{id:1,text:'Confirm tinplate coating cert (EU 10/2011)',done:false},{id:2,text:'Lock in tamarind supplier',done:false},{id:3,text:'pH stability test at 3 months',done:false},{id:4,text:'Label copy draft',done:true}],subs:[{id:10,title:'Packaging',open:false,todos:[{id:11,text:'Get PPG coating spec sheet',done:false},{id:12,text:'BPA-free cert from supplier',done:true}]},{id:13,title:'Equipment',open:false,todos:[{id:14,text:'Quote for steam-jacketed kettle',done:false},{id:15,text:'Visit cider press demo',done:false}]}]},

function save(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify({strands,_id,todayList}));}catch(e){}}
function load(){try{const raw=localStorage.getItem(STORAGE_KEY);if(!raw)return false;const d=JSON.parse(raw);if(d.strands)strands=d.strands;if(d._id)_id=d._id;if(d.todayList)todayList=d.todayList;return true;}catch(e){return false;}}
const findStrand=id=>strands.find(s=>s.id===id);
const findSub=(s,sid)=>s.subs.find(x=>x.id===sid);
function allDone(s){const td=s.todos.filter(t=>t.done).length,tt=s.todos.length;const sd=s.subs.reduce((a,sub)=>a+sub.todos.filter(t=>t.done).length,0);const st=s.subs.reduce((a,sub)=>a+sub.todos.length,0);return{done:td+sd,total:tt+st};}
function isInToday(sid,subid,tid){return todayList.some(x=>x.sid===sid&&x.subid===subid&&x.tid===tid);}
function addToToday(sid,subid,tid){if(!isInToday(sid,subid,tid)){todayList.push({sid,subid,tid});save();render();renderToday();updateBadge();}}
function removeFromToday(sid,subid,tid){todayList=todayList.filter(x=>!(x.sid===sid&&x.subid===subid&&x.tid===tid));save();render();renderToday();updateBadge();}
function toggleTodayItem(sid,subid,tid){const s=findStrand(sid);if(!s)return;if(subid===null){const t=s.todos.find(x=>x.id===tid);if(t)t.done=!t.done;}else{const sub=findSub(s,subid);const t=sub&&sub.todos.find(x=>x.id===tid);if(t)t.done=!t.done;}save();render();renderToday();}
function clearDoneToday(){todayList=todayList.filter(x=>{const s=findStrand(x.sid);if(!s)return false;if(x.subid===null){const t=s.todos.find(t=>t.id===x.tid);return t&&!t.done;}else{const sub=findSub(s,x.subid);const t=sub&&sub.todos.find(t=>t.id===x.tid);return t&&!t.done;}});save();render();renderToday();updateBadge();}
function updateBadge(){const badge=document.getElementById('today-badge');const pending=todayList.filter(x=>{const s=findStrand(x.sid);if(!s)return false;if(x.subid===null){const t=s.todos.find(t=>t.id===x.tid);return t&&!t.done;}else{const sub=findSub(s,x.subid);const t=sub&&sub.todos.find(t=>t.id===x.tid);return t&&!t.done;}}).length;if(badge){badge.textContent=pending;badge.style.display=pending>0?'':'none';}}
function showView(v){currentView=v;document.getElementById('view-strands').classList.toggle('active',v==='strands');document.getElementById('view-today').classList.toggle('active',v==='today');document.getElementById('tab-strands').classList.toggle('active',v==='strands');document.getElementById('tab-today').classList.toggle('active',v==='today');document.getElementById('add-btn').style.display=v==='strands'?'':'none';if(v==='today')renderToday();}
function renderToday(){
const container=document.getElementById('today-content');
const dateEl=document.getElementById('today-date');
if(dateEl){const d=new Date();dateEl.textContent=d.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});}
if(!container)return;
todayList=todayList.filter(x=>{const s=findStrand(x.sid);if(!s)return false;if(x.subid===null)return s.todos.some(t=>t.id===x.tid);const sub=findSub(s,x.subid);return sub&&sub.todos.some(t=>t.id===x.tid);});
if(!todayList.length){container.innerHTML='<div class="today-empty"><h2>Nothing flagged yet.</h2><p>Browse your strands and tap the small "today" button next to any task to add it here.</p></div>';return;}
const items=todayList.map(x=>{
const s=findStrand(x.sid);if(!s)return '';
let todo=null;
if(x.subid===null){todo=s.todos.find(t=>t.id===x.tid);}
else{const sub=findSub(s,x.subid);todo=sub&&sub.todos.find(t=>t.id===x.tid);}
if(!todo)return '';
const subidStr=x.subid===null?'null':x.subid;
return '<li class="today-item '+(todo.done?'done-item':'')+'"><input type="checkbox" class="today-check" '+(todo.done?'checked':'')+' onchange="toggleTodayItem('+x.sid+','+subidStr+','+x.tid+')"><div class="today-item-body"><div class="today-item-text">'+esc(todo.text)+'</div><div class="today-item-source"><div class="today-source-dot" style="background:'+s.color+'"></div><span class="today-source-name">'+esc(s.title)+'</span></div></div><button class="today-remove" onclick="removeFromToday('+x.sid+','+subidStr+','+x.tid+')">x</button></li>';
}).join('');
const hasDone=todayList.some(x=>{const s=findStrand(x.sid);if(!s)return false;if(x.subid===null){const t=s.todos.find(t=>t.id===x.tid);return t&&t.done;}const sub=findSub(s,x.subid);const t=sub&&sub.todos.find(t=>t.id===x.tid);return t&&t.done;});
container.innerHTML='<ul class="today-list">'+items+'</ul>'+(hasDone?'<button class="today-clear-done" onclick="clearDoneToday()">Clear completed</button>':'');
}
const grip=()=>'<div class="todo-grip"><span></span><span></span><span></span><span></span><span></span><span></span></div>';
function render(){
const canvas=document.getElementById('canvas');
if(!strands.length){canvas.innerHTML='<div class="empty-state"><h2>No strands yet.</h2><p>Tap "+ New" to begin.</p></div>';return;}
canvas.innerHTML=strands.map(renderStrand).join('');
initStrandDrag();initTodoDrag();updateBadge();
}
function renderStrand(s){
const{done,total}=allDone(s);
const pct=total?Math.round(done/total*100):0;
const sc={active:'status-active',paused:'status-paused',blocked:'status-blocked'}[s.status];
const sl={active:'Active',paused:'Paused',blocked:'Blocked'}[s.status];
const subCount=s.subs.length;
const todoRows=s.todos.map(t=>{
const inT=isInToday(s.id,null,t.id);
return '<li class="todo-item" data-sid="'+s.id+'" data-tid="'+t.id+'">'+grip()+'<input type="checkbox" class="todo-check" '+(t.done?'checked':'')+' onchange="toggleTodo('+s.id+','+t.id+')"><label class="todo-label" onclick="toggleTodo('+s.id+','+t.id+')">'+esc(t.text)+'</label><button class="todo-today-btn '+(inT?'in-today':'')+'" onclick="'+(inT?'removeFromToday('+s.id+',null,'+t.id+')':'addToToday('+s.id+',null,'+t.id+')')+'">'+(inT?'added':'today')+'</button><button class="todo-del" onclick="deleteTodo('+s.id+','+t.id+')">x</button></li>';
}).join('');
const subRows=s.subs.map(sub=>renderSub(s.id,sub)).join('');
const editPanel='<div class="edit-panel" id="edit-'+s.id+'"><label>Title</label><input type="text" id="et-'+s.id+'" value="'+esc(s.title)+'"><label>Description</label><textarea id="ed-'+s.id+'">'+esc(s.desc)+'</textarea><label>Category</label><input type="text" id="ec-'+s.id+'" value="'+esc(s.tag)+'"><label>Status</label><select id="es-'+s.id+'"><option value="active" '+(s.status==='active'?'selected':'')+'>Active</option><option value="paused" '+(s.status==='paused'?'selected':'')+'>Paused</option><option value="blocked" '+(s.status==='blocked'?'selected':'')+'>Blocked</option></select><label>Colour</label><div class="edit-color-options">'+COLORS.map(c=>'<div class="edit-color-dot '+(c===s.color?'selected':'')+'" style="background:'+c+'" onclick="pickEditColor('+s.id+',\''+c+'\')"></div>').join('')+'</div><div class="edit-actions"><button class="btn-save" onclick="saveEdit('+s.id+')">Save</button><button class="btn-cancel-edit" onclick="closeEdit('+s.id+')">Cancel</button></div></div>';
return '<div class="strand '+(s.open?'open':'')+'" id="strand-'+s.id+'" data-id="'+s.id+'"><div class="strand-accent" style="background:'+s.color+'"></div><div class="drag-handle" data-drag="'+s.id+'"><span></span><span></span><span></span><span></span><span></span><span></span></div><div class="strand-header" onclick="toggleStrand('+s.id+')"><div class="strand-meta"><span class="strand-tag">'+esc(s.tag)+'</span><span class="strand-status '+sc+'">'+sl+'</span></div><div class="strand-title">'+esc(s.title)+'</div><div class="strand-subtitle">'+esc(s.desc)+'</div></div>'+(total>0?'<div class="strand-progress"><div class="strand-progress-fill" style="width:'+pct+'%;background:'+s.color+'"></div></div>':'')+'<div class="strand-footer" onclick="toggleStrand('+s.id+')"><span>'+(total?done+'/'+total+' done':'No tasks')+(subCount?' &middot; '+subCount+' sub':'')+'</span><span style="display:flex;align-items:center;gap:3px"><i class="chevron">&#9658;</i> '+(s.open?'less':'more')+'</span></div><div class="strand-body">'+editPanel+'<div class="body-tabs"><button class="body-tab '+(s.activeTab==='tasks'?'active':'')+'" onclick="setTab('+s.id+',\'tasks\')">Tasks</button><button class="body-tab '+(s.activeTab==='subs'?'active':'')+'" onclick="setTab('+s.id+',\'subs\')">Sub-strands'+(subCount?' ('+subCount+')':'')+'</button></div><div class="tab-pane '+(s.activeTab==='tasks'?'active':'')+'"><ul class="todos" id="todos-'+s.id+'">'+todoRows+'</ul><div class="add-todo"><input type="text" id="newtodo-'+s.id+'" placeholder="Add a task..." onkeydown="if(event.key===\'Enter\')addTodo('+s.id+')"><button onclick="addTodo('+s.id+')">Add</button></div></div><div class="tab-pane '+(s.activeTab==='subs'?'active':'')+'"><div class="substrands-grid">'+subRows+'<div class="new-substrand-form" id="nsf-'+s.id+'"><input type="text" id="nst-'+s.id+'" placeholder="Sub-strand name..." onkeydown="if(event.key===\'Enter\')confirmNewSub('+s.id+')"><div class="form-row"><button class="btn-confirm" onclick="confirmNewSub('+s.id+')">Create</button><button class="btn-cancel-sm" onclick="cancelNewSub('+s.id+')">Cancel</button></div></div><button class="add-substrand-btn" id="nsb-'+s.id+'" onclick="showNewSubForm('+s.id+')">+ Add sub-strand</button></div></div><div class="strand-actions"><button class="strand-edit-btn" onclick="openEdit('+s.id+')">Edit</button><button class="strand-delete-btn" onclick="deleteStrand('+s.id+')">Delete</button></div></div></div>';
}
function renderSub(sid,sub){
const done=sub.todos.filter(t=>t.done).length,total=sub.todos.length;
const color=findStrand(sid).color;
const todoRows=sub.todos.map(t=>{
const inT=isInToday(sid,sub.id,t.id);
return '<li class="substrand-todo" data-sid="'+sid+'" data-subid="'+sub.id+'" data-tid="'+t.id+'">'+grip()+'<input type="checkbox" class="todo-check" '+(t.done?'checked':'')+' onchange="toggleSubTodo('+sid+','+sub.id+','+t.id+')"><label class="todo-label" onclick="toggleSubTodo('+sid+','+sub.id+','+t.id+')">'+esc(t.text)+'</label><button class="todo-today-btn '+(inT?'in-today':'')+'" onclick="'+(inT?'removeFromToday('+sid+','+sub.id+','+t.id+')':'addToToday('+sid+','+sub.id+','+t.id+')')+'">'+(inT?'added':'today')+'</button><button class="todo-del" onclick="deleteSubTodo('+sid+','+sub.id+','+t.id+')">x</button></li>';
}).join('');
return '<div class="substrand '+(sub.open?'open':'')+'" id="sub-'+sid+'-'+sub.id+'"><div class="substrand-accent" style="background:'+color+'88"></div><div class="substrand-header" onclick="toggleSub('+sid+','+sub.id+')"><div><div class="substrand-title">'+esc(sub.title)+'</div><div class="substrand-meta">'+(total?done+'/'+total+' done':'No tasks yet')+'</div></div><span class="substrand-chevron">&#9658;</span></div><div class="substrand-body"><ul class="substrand-todos" id="subtodos-'+sid+'-'+sub.id+'">'+todoRows+'</ul><div class="substrand-add"><input type="text" id="sst-'+sid+'-'+sub.id+'" placeholder="Add task..." onkeydown="if(event.key===\'Enter\')addSubTodo('+sid+','+sub.id+')"><button onclick="addSubTodo('+sid+','+sub.id+')">Add</button></div><div class="substrand-del-row"><button class="substrand-del-btn" onclick="deleteSub('+sid+','+sub.id+')">Delete</button></div></div></div>';
}
let editColorPick={};
function openEdit(id){const s=findStrand(id);if(!s)return;editColorPick[id]=s.color;const p=document.getElementById('edit-'+id);if(p)p.classList.add('visible');}
function closeEdit(id){const p=document.getElementById('edit-'+id);if(p)p.classList.remove('visible');}
function pickEditColor(id,c){editColorPick[id]=c;const p=document.getElementById('edit-'+id);if(p)p.querySelectorAll('.edit-color-dot').forEach(d=>d.classList.toggle('selected',d.style.background===c||d.style.backgroundColor===c));}
function saveEdit(id){const s=findStrand(id);if(!s)return;const t=document.getElementById('et-'+id);const d=document.getElementById('ed-'+id);const c=document.getElementById('ec-'+id);const st=document.getElementById('es-'+id);if(t)s.title=t.value.trim()||s.title;if(d)s.desc=d.value.trim();if(c)s.tag=c.value.trim()||s.tag;if(st)s.status=st.value;if(editColorPick[id])s.color=editColorPick[id];s.open=true;save();render();}
let dragSrcId=null,touchDragId=null,touchClone=null,touchOffX=0,touchOffY=0;
function initStrandDrag(){
const canvas=document.getElementById('canvas');
canvas.querySelectorAll('.strand').forEach(el=>el.setAttribute('draggable','false'));
canvas.querySelectorAll('.drag-handle').forEach(handle=>{
handle.addEventListener('mousedown',e=>{const card=handle.closest('.strand');card.setAttribute('draggable','true');dragSrcId=parseInt(card.dataset.id);});
handle.addEventListener('touchstart',e=>{const card=handle.closest('.strand');touchDragId=parseInt(card.dataset.id);const touch=e.touches[0];const rect=card.getBoundingClientRect();touchOffX=touch.clientX-rect.left;touchOffY=touch.clientY-rect.top;touchClone=card.cloneNode(true);touchClone.style.cssText='position:fixed;z-index:999;width:'+rect.width+'px;opacity:0.85;pointer-events:none;box-shadow:0 8px 32px rgba(26,18,8,0.25);transform:scale(1.03);transition:none;border-radius:4px;';touchClone.style.left=(touch.clientX-touchOffX)+'px';touchClone.style.top=(touch.clientY-touchOffY)+'px';document.body.appendChild(touchClone);card.classList.add('dragging');e.preventDefault();},{passive:false});
handle.addEventListener('touchmove',e=>{if(!touchClone)return;const touch=e.touches[0];touchClone.style.left=(touch.clientX-touchOffX)+'px';touchClone.style.top=(touch.clientY-touchOffY)+'px';touchClone.style.display='none';const el=document.elementFromPoint(touch.clientX,touch.clientY);touchClone.style.display='';const over=el&&el.closest('.strand[data-id]');document.querySelectorAll('.strand').forEach(c=>c.classList.remove('drag-over'));if(over&&parseInt(over.dataset.id)!==touchDragId)over.classList.add('drag-over');e.preventDefault();},{passive:false});
handle.addEventListener('touchend',e=>{if(!touchClone){touchDragId=null;return;}const touch=e.changedTouches[0];touchClone.style.display='none';const el=document.elementFromPoint(touch.clientX,touch.clientY);touchClone.style.display='';const over=el&&el.closest('.strand[data-id]');if(over){const targetId=parseInt(over.dataset.id);if(targetId!==touchDragId){const si=strands.findIndex(s=>s.id===touchDragId);const ti=strands.findIndex(s=>s.id===targetId);const[moved]=strands.splice(si,1);strands.splice(ti,0,moved);save();}}touchClone.remove();touchClone=null;touchDragId=null;document.querySelectorAll('.strand').forEach(c=>c.classList.remove('dragging','drag-over'));render();});
});
canvas.addEventListener('dragstart',e=>{const card=e.target.closest('.strand');if(!card)return;dragSrcId=parseInt(card.dataset.id);card.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
canvas.addEventListener('dragend',e=>{canvas.querySelectorAll('.strand').forEach(el=>{el.classList.remove('dragging','drag-over');el.setAttribute('draggable','false');});dragSrcId=null;});
canvas.addEventListener('dragover',e=>{e.preventDefault();const card=e.target.closest('.strand[data-id]');if(!card||parseInt(card.dataset.id)===dragSrcId)return;canvas.querySelectorAll('.strand').forEach(el=>el.classList.remove('drag-over'));card.classList.add('drag-over');});
canvas.addEventListener('drop',e=>{e.preventDefault();const card=e.target.closest('.strand[data-id]');if(!card||!dragSrcId)return;const targetId=parseInt(card.dataset.id);if(targetId===dragSrcId)return;const si=strands.findIndex(s=>s.id===dragSrcId);const ti=strands.findIndex(s=>s.id===targetId);const[moved]=strands.splice(si,1);strands.splice(ti,0,moved);save();render();});
}
let todoTouchSrc=null,todoTouchClone=null,todoTouchOffX=0,todoTouchOffY=0;
function initTodoDrag(){
document.querySelectorAll('.todo-grip').forEach(grip=>{
const li=grip.closest('li');if(!li)return;
grip.addEventListener('touchstart',e=>{todoTouchSrc=li;const touch=e.touches[0];const rect=li.getBoundingClientRect();todoTouchOffX=touch.clientX-rect.left;todoTouchOffY=touch.clientY-rect.top;todoTouchClone=li.cloneNode(true);todoTouchClone.style.cssText='position:fixed;z-index:998;width:'+rect.width+'px;opacity:0.8;pointer-events:none;background:var(--card);border-radius:2px;padding:8px;font-size:0.75rem;font-family:DM Mono,monospace;box-shadow:0 4px 16px rgba(26,18,8,0.18);';todoTouchClone.style.left=(touch.clientX-todoTouchOffX)+'px';todoTouchClone.style.top=(touch.clientY-todoTouchOffY)+'px';document.body.appendChild(todoTouchClone);li.classList.add('todo-dragging');e.preventDefault();e.stopPropagation();},{passive:false});
grip.addEventListener('touchmove',e=>{if(!todoTouchClone)return;const touch=e.touches[0];todoTouchClone.style.left=(touch.clientX-todoTouchOffX)+'px';todoTouchClone.style.top=(touch.clientY-todoTouchOffY)+'px';todoTouchClone.style.display='none';const el=document.elementFromPoint(touch.clientX,touch.clientY);todoTouchClone.style.display='';document.querySelectorAll('li.todo-item,li.substrand-todo').forEach(l=>l.classList.remove('todo-over'));const overLi=el&&el.closest('li.todo-item,li.substrand-todo');if(overLi&&overLi!==todoTouchSrc)overLi.classList.add('todo-over');e.preventDefault();e.stopPropagation();},{passive:false});
grip.addEventListener('touchend',e=>{if(!todoTouchClone){todoTouchSrc=null;return;}const touch=e.changedTouches[0];todoTouchClone.style.display='none';const el=document.elementFromPoint(touch.clientX,touch.clientY);todoTouchClone.style.display='';const overLi=el&&el.closest('li.todo-item,li.substrand-todo');if(overLi&&overLi!==todoTouchSrc)reorderTodo(todoTouchSrc,overLi);todoTouchClone.remove();todoTouchClone=null;document.querySelectorAll('li').forEach(l=>l.classList.remove('todo-dragging','todo-over'));todoTouchSrc=null;render();});
grip.addEventListener('mousedown',()=>{if(li)li.setAttribute('draggable','true');});
li.addEventListener('dragstart',e=>{if(!e.target.closest('.todo-grip')){e.preventDefault();return;}todoTouchSrc=li;li.classList.add('todo-dragging');e.dataTransfer.effectAllowed='move';e.stopPropagation();});
li.addEventListener('dragend',()=>{document.querySelectorAll('li').forEach(l=>l.classList.remove('todo-dragging','todo-over'));li.setAttribute('draggable','false');todoTouchSrc=null;});
li.addEventListener('dragover',e=>{e.preventDefault();e.stopPropagation();document.querySelectorAll('li').forEach(l=>l.classList.remove('todo-over'));if(li!==todoTouchSrc)li.classList.add('todo-over');});
li.addEventListener('drop',e=>{e.preventDefault();e.stopPropagation();if(!todoTouchSrc||todoTouchSrc===li)return;reorderTodo(todoTouchSrc,li);render();});
});
}
function reorderTodo(src,target){
if(src.classList.contains('todo-item')){const sid=parseInt(src.dataset.sid),srcTid=parseInt(src.dataset.tid),tgtTid=parseInt(target.dataset.tid);const s=findStrand(sid);if(!s)return;const si=s.todos.findIndex(t=>t.id===srcTid),ti=s.todos.findIndex(t=>t.id===tgtTid);if(si>-1&&ti>-1){const[m]=s.todos.splice(si,1);s.todos.splice(ti,0,m);s.open=true;save();}}
else{const sid=parseInt(src.dataset.sid),subid=parseInt(src.dataset.subid),srcTid=parseInt(src.dataset.tid),tgtTid=parseInt(target.dataset.tid);const s=findStrand(sid);const sub=s&&findSub(s,subid);if(!sub)return;const si=sub.todos.findIndex(t=>t.id===srcTid),ti=sub.todos.findIndex(t=>t.id===tgtTid);if(si>-1&&ti>-1){const[m]=sub.todos.splice(si,1);sub.todos.splice(ti,0,m);s.open=true;sub.open=true;s.activeTab='subs';save();}}
}
function toggleStrand(id){const s=findStrand(id);if(s){s.open=!s.open;save();render();}}
function setTab(id,tab){const s=findStrand(id);if(s){s.activeTab=tab;s.open=true;save();render();}}
function deleteStrand(id){if(confirm('Delete this strand?')){todayList=todayList.filter(x=>x.sid!==id);strands=strands.filter(s=>s.id!==id);save();render();}}
function toggleTodo(sid,tid){const s=findStrand(sid);const t=s&&s.todos.find(x=>x.id===tid);if(t){t.done=!t.done;s.open=true;save();render();if(currentView==='today')renderToday();}}
function deleteTodo(sid,tid){todayList=todayList.filter(x=>!(x.sid===sid&&x.subid===null&&x.tid===tid));const s=findStrand(sid);if(s){s.todos=s.todos.filter(x=>x.id!==tid);s.open=true;save();render();}}
function addTodo(sid){const el=document.getElementById('newtodo-'+sid);const text=el?el.value.trim():'';if(!text)return;const s=findStrand(sid);if(!s)return;s.todos.push({id:uid(),text,done:false});s.open=true;save();render();setTimeout(()=>{const e=document.getElementById('newtodo-'+sid);if(e)e.focus();},30);}
function toggleSub(sid,subid){const s=findStrand(sid);const sub=s&&findSub(s,subid);if(sub){sub.open=!sub.open;s.open=true;s.activeTab='subs';save();render();}}
function deleteSub(sid,subid){if(confirm('Delete sub-strand?')){todayList=todayList.filter(x=>!(x.sid===sid&&x.subid===subid));const s=findStrand(sid);if(s){s.subs=s.subs.filter(x=>x.id!==subid);s.open=true;s.activeTab='subs';save();render();}}}
function toggleSubTodo(sid,subid,tid){const s=findStrand(sid);const sub=s&&findSub(s,subid);const t=sub&&sub.todos.find(x=>x.id===tid);if(t){t.done=!t.done;s.open=true;sub.open=true;s.activeTab='subs';save();render();if(currentView==='today')renderToday();}}
function deleteSubTodo(sid,subid,tid){todayList=todayList.filter(x=>!(x.sid===sid&&x.subid===subid&&x.tid===tid));const s=findStrand(sid);const sub=s&&findSub(s,subid);if(sub){sub.todos=sub.todos.filter(x=>x.id!==tid);s.open=true;sub.open=true;s.activeTab='subs';save();render();}}
function addSubTodo(sid,subid){const key='sst-'+sid+'-'+subid;const el=document.getElementById(key);const text=el?el.value.trim():'';if(!text)return;const s=findStrand(sid);const sub=s&&findSub(s,subid);if(!sub)return;sub.todos.push({id:uid(),text,done:false});s.open=true;sub.open=true;s.activeTab='subs';save();render();setTimeout(()=>{const e=document.getElementById(key);if(e)e.focus();},30);}
function showNewSubForm(sid){const form=document.getElementById('nsf-'+sid);const btn=document.getElementById('nsb-'+sid);if(form){form.classList.add('visible');btn.style.display='none';}setTimeout(()=>{const e=document.getElementById('nst-'+sid);if(e)e.focus();},30);}
function cancelNewSub(sid){const form=document.getElementById('nsf-'+sid);const btn=document.getElementById('nsb-'+sid);if(form){form.classList.remove('visible');btn.style.display='';}const e=document.getElementById('nst-'+sid);if(e)e.value='';}
function confirmNewSub(sid){const el=document.getElementById('nst-'+sid);const title=el?el.value.trim():'';if(!title){if(el)el.focus();return;}const s=findStrand(sid);if(!s)return;s.subs.push({id:uid(),title,open:false,todos:[]});s.open=true;s.activeTab='subs';save();render();}
function openModal(){['m-title','m-desc','m-tag'].forEach(id=>document.getElementById(id).value='');document.getElementById('m-status').value='active';selectedColor=COLORS[0];renderColorDots();document.getElementById('modal').classList.add('open');setTimeout(()=>document.getElementById('m-title').focus(),50);}
function closeModal(){document.getElementById('modal').classList.remove('open');}
function closeModalOnOverlay(e){if(e.target.id==='modal')closeModal();}
function renderColorDots(){document.getElementById('color-options').innerHTML=COLORS.map(c=>'<div class="color-dot '+(c===selectedColor?'selected':'')+'" style="background:'+c+'" onclick="selectColor(\''+c+'\')"></div>').join('');}
function selectColor(c){selectedColor=c;renderColorDots();}
function createStrand(){const title=document.getElementById('m-title').value.trim();if(!title){document.getElementById('m-title').focus();return;}strands.push({id:uid(),title,desc:document.getElementById('m-desc').value.trim(),tag:document.getElementById('m-tag').value.trim()||'General',status:document.getElementById('m-status').value,color:selectedColor,open:true,activeTab:'tasks',todos:[],subs:[]});closeModal();save();render();}

renderColorDots();
load();
render();
</script>
</body>
</html>
