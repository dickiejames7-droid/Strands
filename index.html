<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Strands">
<meta name="theme-color" content="#f5f0e8">
<title>Strands</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&display=swap');
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
--bg: #f5f0e8; --ink: #1a1208; --mid: #6b5f4a; --faint: #e0d8c8;
--accent: #c8440a; --accent2: #2a6b4a; --card: #faf7f0; --subcard: #f0ebe0;
--shadow: rgba(26,18,8,0.12); --radius: 4px; --transition: 0.22s cubic-bezier(0.4,0,0.2,1);
}
body { font-family: 'DM Mono', monospace; background: var(--bg); color: var(--ink); min-height: 100vh; overflow-x: hidden; padding-bottom: env(safe-area-inset-bottom); }
body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events: none; z-index: 1000; opacity: 0.6; }
header { padding: 16px 16px 14px; padding-top: calc(16px + env(safe-area-inset-top)); border-bottom: 1px solid var(--faint); display: flex; align-items: center; background: var(--bg); position: sticky; top: 0; z-index: 100; }
header h1 { font-family: 'Libre Baskerville', serif; font-size: 1.15rem; font-weight: 400; letter-spacing: -0.02em; }
header h1 span { color: var(--accent); font-style: italic; }
.add-btn { margin-left: auto; font-family: 'DM Mono', monospace; font-size: 0.68rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; background: var(--ink); color: var(--bg); border: none; padding: 7px 13px; cursor: pointer; border-radius: var(--radius); flex-shrink: 0; }
.add-btn:active { background: var(--accent); }
.canvas { padding: 12px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; align-items: start; }
.strand.dragging { opacity: 0.4; transform: scale(0.97); }
.strand.drag-over { box-shadow: 0 0 0 2px var(--accent); }
.strand { background: var(--card); border: 1px solid var(--faint); border-radius: var(--radius); box-shadow: 0 1px 4px var(--shadow); position: relative; overflow: hidden; transition: box-shadow var(--transition), opacity 0.2s; touch-action: auto; }
.strand.open { grid-column: 1 / -1; }
.strand-accent { position: absolute; top: 0; left: 0; right: 0; height: 3px; }
.drag-handle { position: absolute; top: 8px; left: 7px; display: grid; grid-template-columns: 1fr 1fr; gap: 2px; padding: 2px; cursor: grab; opacity: 0.25; z-index: 5; }
.drag-handle span { display: block; width: 3px; height: 3px; background: var(--ink); border-radius: 50%; }
.drag-handle:active { cursor: grabbing; }
.strand-header { padding: 12px 12px 10px 22px; cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent; }
.strand-meta { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; flex-wrap: wrap; }
.strand-tag { font-size: 0.55rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--mid); border: 1px solid var(--faint); padding: 1px 5px; border-radius: 2px; }
.strand-status { font-size: 0.55rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; padding: 1px 5px; border-radius: 2px; margin-left: auto; }
.status-active { background: #e8f4ee; color: #2a6b4a; }
.status-paused { background: #f4efe8; color: #6b4a2a; }
.status-blocked { background: #f4e8e8; color: #c8440a; }
.strand-title { font-family: 'Libre Baskerville', serif; font-size: 0.88rem; font-weight: 700; line-height: 1.3; margin-bottom: 3px; }
.strand-subtitle { font-size: 0.63rem; color: var(--mid); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.strand-progress { margin: 8px 12px 0; height: 2px; background: var(--faint); border-radius: 2px; overflow: hidden; }
.strand-progress-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease; }
.strand-footer { padding: 7px 12px; display: flex; align-items: center; justify-content: space-between; font-size: 0.6rem; color: var(--mid); cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent; }
.chevron { display: inline-block; transition: transform 0.2s; font-style: normal; }
.strand.open > .strand-footer .chevron { transform: rotate(90deg); }
.strand-body { display: none; padding: 0 12px 14px; border-top: 1px solid var(--faint); }
.strand.open > .strand-body { display: block; }
.body-tabs { display: flex; margin-top: 12px; border-bottom: 1px solid var(--faint); }
.body-tab { font-family: 'DM Mono', monospace; font-size: 0.62rem; font-weight: 500; letter-spacing: 0.07em; text-transform: uppercase; padding: 5px 12px 6px; border: none; background: none; color: var(--mid); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; -webkit-tap-highlight-color: transparent; }
.body-tab.active { color: var(--ink); border-bottom-color: var(--ink); }
.tab-pane { display: none; }
.tab-pane.active { display: block; }
.todos { list-style: none; margin-top: 10px; }
.todo-item { display: flex; align-items: flex-start; gap: 9px; padding: 8px 0; border-bottom: 1px solid var(--faint); font-size: 0.75rem; line-height: 1.4; }
.todo-item:last-child { border-bottom: none; }
.todo-check { width: 17px; height: 17px; border: 1.5px solid var(--mid); border-radius: 2px; flex-shrink: 0; margin-top: 1px; cursor: pointer; appearance: none; background: transparent; position: relative; }
.todo-check:checked { background: var(--accent2); border-color: var(--accent2); }
.todo-check:checked::after { content: ''; position: absolute; left: 3px; top: 0; width: 5px; height: 9px; border: 1.5px solid white; border-top: none; border-left: none; transform: rotate(40deg); }
.todo-label { flex: 1; cursor: pointer; }
.todo-check:checked + .todo-label { text-decoration: line-through; color: var(--mid); }
.todo-del { background: none; border: none; color: var(--faint); cursor: pointer; font-size: 1rem; padding: 0 4px; min-width: 28px; text-align: center; }
.todo-del:active { color: var(--accent); }
.add-todo { display: flex; gap: 7px; margin-top: 10px; }
.add-todo input { flex: 1; font-family: 'DM Mono', monospace; font-size: 0.75rem; background: var(--faint); border: 1px solid transparent; border-radius: var(--radius); padding: 9px 9px; color: var(--ink); outline: none; }
.add-todo input:focus { border-color: var(--mid); }
.add-todo input::placeholder { color: var(--mid); opacity: 0.6; }
.add-todo button { font-family: 'DM Mono', monospace; font-size: 0.68rem; background: var(--ink); color: var(--bg); border: none; padding: 9px 12px; border-radius: var(--radius); cursor: pointer; }
.add-todo button:active { background: var(--accent); }
.substrands-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; margin-top: 10px; }
.substrand { background: var(--subcard); border: 1px solid var(--faint); border-radius: var(--radius); overflow: hidden; position: relative; }
.substrand.open { grid-column: 1 / -1; }
.substrand-accent { height: 2px; }
.substrand-header { padding: 9px; cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent; display: flex; align-items: center; justify-content: space-between; }
.substrand-title { font-family: 'Libre Baskerville', serif; font-weight: 700; font-size: 0.78rem; line-height: 1.3; margin-bottom: 2px; }
.substrand-meta { font-size: 0.62rem; color: var(--mid); }
.substrand-chevron { font-size: 0.72rem; color: var(--mid); transition: transform 0.2s; flex-shrink: 0; margin-left: 6px; }
.substrand.open .substrand-chevron { transform: rotate(90deg); }
.substrand-body { display: none; padding: 0 9px 9px; border-top: 1px solid var(--faint); }
.substrand.open .substrand-body { display: block; }
.substrand-todos { list-style: none; margin-top: 7px; }
.substrand-todo { display: flex; align-items: flex-start; gap: 7px; padding: 7px 0; border-bottom: 1px solid var(--faint); font-size: 0.7rem; line-height: 1.4; }
.substrand-todo:last-child { border-bottom: none; }
.substrand-todo .todo-check { width: 15px; height: 15px; }
.substrand-todo .todo-check:checked::after { left: 2px; top: 0; width: 4px; height: 8px; }
.substrand-add { display: flex; gap: 6px; margin-top: 8px; }
.substrand-add input { flex: 1; font-family: 'DM Mono', monospace; font-size: 0.7rem; background: var(--bg); border: 1px solid transparent; border-radius: var(--radius); padding: 7px 8px; color: var(--ink); outline: none; }
.substrand-add input::placeholder { color: var(--mid); opacity: 0.6; }
.substrand-add button { font-family: 'DM Mono', monospace; font-size: 0.65rem; background: var(--ink); color: var(--bg); border: none; padding: 7px 10px; border-radius: var(--radius); cursor: pointer; }
.substrand-add button:active { background: var(--accent); }
.substrand-del-row { display: flex; justify-content: flex-end; margin-top: 8px; padding-top: 7px; border-top: 1px solid var(--faint); }
.substrand-del-btn { font-family: 'DM Mono', monospace; font-size: 0.62rem; letter-spacing: 0.06em; text-transform: uppercase; background: none; border: 1px solid var(--faint); color: var(--mid); padding: 5px 10px; border-radius: var(--radius); cursor: pointer; }
.substrand-del-btn:active { border-color: var(--accent); color: var(--accent); }
.add-substrand-btn { grid-column: 1 / -1; font-family: 'DM Mono', monospace; font-size: 0.65rem; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; background: none; border: 1px dashed var(--faint); color: var(--mid); padding: 9px; border-radius: var(--radius); cursor: pointer; width: 100%; }
.add-substrand-btn:active { border-color: var(--mid); background: var(--faint); }
.new-substrand-form { grid-column: 1 / -1; background: var(--subcard); border: 1px solid var(--mid); border-radius: var(--radius); padding: 10px; display: none; }
.new-substrand-form.visible { display: block; }
.new-substrand-form input { width: 100%; font-family: 'DM Mono', monospace; font-size: 0.75rem; background: var(--bg); border: 1px solid var(--faint); border-radius: var(--radius); padding: 8px 9px; color: var(--ink); outline: none; margin-bottom: 8px; }
.new-substrand-form input::placeholder { color: var(--mid); opacity: 0.6; }
.form-row { display: flex; gap: 7px; }
.form-row button { font-family: 'DM Mono', monospace; font-size: 0.68rem; padding: 7px 14px; border: none; border-radius: var(--radius); cursor: pointer; }
.btn-confirm { background: var(--ink); color: var(--bg); }
.btn-confirm:active { background: var(--accent); }
.btn-cancel-sm { background: var(--faint); color: var(--ink); }
.strand-actions { display: flex; justify-content: flex-end; margin-top: 14px; padding-top: 10px; border-top: 1px solid var(--faint); }
.strand-delete-btn { font-family: 'DM Mono', monospace; font-size: 0.62rem; letter-spacing: 0.06em; text-transform: uppercase; background: none; border: 1px solid var(--faint); color: var(--mid); padding: 6px 12px; border-radius: var(--radius); cursor: pointer; }
.strand-delete-btn:active { border-color: var(--accent); color: var(--accent); }
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(26,18,8,0.5); z-index: 500; backdrop-filter: blur(2px); align-items: flex-end; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: var(--card); border-radius: var(--radius) var(--radius) 0 0; padding: 24px 20px; padding-bottom: calc(24px + env(safe-area-inset-bottom)); width: 100%; max-height: 90vh; overflow-y: auto; }
.modal h2 { font-family: 'Libre Baskerville', serif; font-size: 1rem; font-weight: 700; margin-bottom: 18px; }
.modal label { display: block; font-size: 0.65rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--mid); margin-bottom: 5px; margin-top: 13px; }
.modal label:first-of-type { margin-top: 0; }
.modal input, .modal select, .modal textarea { width: 100%; font-family: 'DM Mono', monospace; font-size: 0.85rem; background: var(--faint); border: 1px solid transparent; border-radius: var(--radius); padding: 11px 12px; color: var(--ink); outline: none; -webkit-appearance: none; }
.modal input:focus, .modal select:focus, .modal textarea:focus { border-color: var(--mid); }
.modal textarea { resize: vertical; min-height: 60px; }
.color-options { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 6px; }
.color-dot { width: 28px; height: 28px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; }
.color-dot.selected { border-color: var(--ink); }
.modal-actions { display: flex; gap: 10px; margin-top: 20px; }
.modal-actions button { font-family: 'DM Mono', monospace; font-size: 0.78rem; padding: 12px 20px; border-radius: var(--radius); border: none; cursor: pointer; flex: 1; }
.btn-primary { background: var(--ink); color: var(--bg); }
.btn-primary:active { background: var(--accent); }
.btn-secondary { background: var(--faint); color: var(--ink); }
.empty-state { grid-column: 1/-1; text-align: center; padding: 60px 20px; color: var(--mid); }
.empty-state h2 { font-family: 'Libre Baskerville', serif; font-size: 1.2rem; font-weight: 400; font-style: italic; margin-bottom: 8px; }
.empty-state p { font-size: 0.74rem; opacity: 0.7; }
</style>
</head>
<body>
<header>
<h1><span>Strands</span></h1>
<button class="add-btn" onclick="openModal()">+ New</button>
</header>
<div class="canvas" id="canvas"></div>
<div class="modal-overlay" id="modal" onclick="closeModalOnOverlay(event)">
<div class="modal">
<h2>New strand</h2>
<label>Title</label>
<input type="text" id="m-title" placeholder="e.g. Chai concentrate">
<label>Description</label>
<textarea id="m-desc" placeholder="What is this strand about?"></textarea>
<label>Category</label>
<input type="text" id="m-tag" placeholder="e.g. Harth / CIMA / Personal">
<label>Status</label>
<select id="m-status">
<option value="active">Active</option>
<option value="paused">Paused</option>
<option value="blocked">Blocked</option>
</select>
<label>Colour</label>
<div class="color-options" id="color-options"></div>
<div class="modal-actions">
<button class="btn-primary" onclick="createStrand()">Create</button>
<button class="btn-secondary" onclick="closeModal()">Cancel</button>
</div>
</div>
</div>
<script>
const COLORS=['#c8440a','#2a6b4a','#2a4a8a','#8a2a6b','#6b4a2a','#1a6b6b','#8a6b2a','#4a2a8a','#6b2a2a','#2a6b2a'];
const STORAGE_KEY='strands-data-v2';
let selectedColor=COLORS[0];
let _id=200;
const uid=()=>_id++;
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

let strands=[
{id:1,title:'Chai Concentrate',tag:'Harth',status:'active',desc:'pH, Brix, packaging, supplier sourcing',color:COLORS[0],open:false,activeTab:'tasks',todos:[{id:1,text:'Confirm tinplate coating cert (EU 10/2011)',done:false},{id:2,text:'Lock in tamarind supplier',done:false},{id:3,text:'pH stability test at 3 months',done:false},{id:4,text:'Label copy draft',done:true}],subs:[{id:10,title:'Packaging',open:false,todos:[{id:11,text:'Get PPG coating spec sheet',done:false},{id:12,text:'BPA-free cert from supplier',done:true}]},{id:13,title:'Equipment',open:false,todos:[{id:14,text:'Quote for steam-jacketed kettle',done:false},{id:15,text:'Visit cider press demo',done:false}]}]},
{id:2,title:'CIMA Management',tag:'Study',status:'active',desc:'Management Case Study prep',color:COLORS[2],open:false,activeTab:'tasks',todos:[{id:20,text:'Revise IAS 36 impairment',done:false},{id:21,text:'Practice MCS mock paper 1',done:false},{id:22,text:'Sensitivity analysis examples',done:true}],subs:[{id:30,title:'Mock Papers',open:false,todos:[{id:31,text:'Mock 1 - score and review',done:false},{id:32,text:'Mock 2 - timed conditions',done:false}]}]},
{id:3,title:'Harth Financial Model',tag:'Finance',status:'active',desc:'Three-statement model',color:COLORS[4],open:false,activeTab:'tasks',todos:[{id:40,text:'Link COGS schedule to P&L',done:false},{id:41,text:'Working capital - debtor days',done:false}],subs:[]},
{id:4,title:'Film Photography',tag:'Creative',status:'paused',desc:'Zone System, darkroom, photobook',color:COLORS[5],open:false,activeTab:'tasks',todos:[{id:50,text:'Book Negative Thinking darkroom',done:false},{id:51,text:'Develop RZ67 roll',done:true}],subs:[]}
];

function save(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify({strands,_id}));}catch(e){}}
function load(){try{const raw=localStorage.getItem(STORAGE_KEY);if(!raw)return false;const d=JSON.parse(raw);if(d.strands)strands=d.strands;if(d._id)_id=d._id;return true;}catch(e){return false;}}
const findStrand=id=>strands.find(s=>s.id===id);
const findSub=(s,sid)=>s.subs.find(x=>x.id===sid);
function allDone(s){const td=s.todos.filter(t=>t.done).length,tt=s.todos.length;const sd=s.subs.reduce((a,sub)=>a+sub.todos.filter(t=>t.done).length,0);const st=s.subs.reduce((a,sub)=>a+sub.todos.length,0);return{done:td+sd,total:tt+st};}

function render(){
const canvas=document.getElementById('canvas');
if(!strands.length){canvas.innerHTML='<div class="empty-state"><h2>No strands yet.</h2><p>Tap "+ New" to begin.</p></div>';return;}
canvas.innerHTML=strands.map(renderStrand).join('');
initDrag();
}

function renderStrand(s){
const{done,total}=allDone(s);
const pct=total?Math.round(done/total*100):0;
const sc={active:'status-active',paused:'status-paused',blocked:'status-blocked'}[s.status];
const sl={active:'Active',paused:'Paused',blocked:'Blocked'}[s.status];
const subCount=s.subs.length;
const todoRows=s.todos.map(t=>`<li class="todo-item"><input type="checkbox" class="todo-check" ${t.done?'checked':''} onchange="toggleTodo(${s.id},${t.id})"><label class="todo-label" onclick="toggleTodo(${s.id},${t.id})">${esc(t.text)}</label><button class="todo-del" onclick="deleteTodo(${s.id},${t.id})">x</button></li>`).join('');
const subRows=s.subs.map(sub=>renderSub(s.id,sub)).join('');
return `<div class="strand ${s.open?'open':''}" id="strand-${s.id}" data-id="${s.id}">
<div class="strand-accent" style="background:${s.color}"></div>
<div class="drag-handle" data-drag="${s.id}"><span></span><span></span><span></span><span></span><span></span><span></span></div>
<div class="strand-header" onclick="toggleStrand(${s.id})">
<div class="strand-meta"><span class="strand-tag">${esc(s.tag)}</span><span class="strand-status ${sc}">${sl}</span></div>
<div class="strand-title">${esc(s.title)}</div>
<div class="strand-subtitle">${esc(s.desc)}</div>
</div>
${total>0?`<div class="strand-progress"><div class="strand-progress-fill" style="width:${pct}%;background:${s.color}"></div></div>`:''}
<div class="strand-footer" onclick="toggleStrand(${s.id})">
<span>${total?`${done}/${total} done`:'No tasks'}${subCount?` · ${subCount} sub`:''}</span>
<span style="display:flex;align-items:center;gap:3px"><i class="chevron">&#9658;</i> ${s.open?'less':'more'}</span>
</div>
<div class="strand-body">
<div class="body-tabs">
<button class="body-tab ${s.activeTab==='tasks'?'active':''}" onclick="setTab(${s.id},'tasks')">Tasks</button>
<button class="body-tab ${s.activeTab==='subs'?'active':''}" onclick="setTab(${s.id},'subs')">Sub-strands${subCount?` (${subCount})`:''}</button>
</div>
<div class="tab-pane ${s.activeTab==='tasks'?'active':''}">
<ul class="todos">${todoRows}</ul>
<div class="add-todo"><input type="text" id="newtodo-${s.id}" placeholder="Add a task..." onkeydown="if(event.key==='Enter')addTodo(${s.id})"><button onclick="addTodo(${s.id})">Add</button></div>
</div>
<div class="tab-pane ${s.activeTab==='subs'?'active':''}">
<div class="substrands-grid">
${subRows}
<div class="new-substrand-form" id="nsf-${s.id}"><input type="text" id="nst-${s.id}" placeholder="Sub-strand name..." onkeydown="if(event.key==='Enter')confirmNewSub(${s.id})"><div class="form-row"><button class="btn-confirm" onclick="confirmNewSub(${s.id})">Create</button><button class="btn-cancel-sm" onclick="cancelNewSub(${s.id})">Cancel</button></div></div>
<button class="add-substrand-btn" id="nsb-${s.id}" onclick="showNewSubForm(${s.id})">+ Add sub-strand</button>
</div>
</div>
<div class="strand-actions"><button class="strand-delete-btn" onclick="deleteStrand(${s.id})">Delete strand</button></div>
</div>
</div>`;
}

function renderSub(sid,sub){
const done=sub.todos.filter(t=>t.done).length,total=sub.todos.length;
const color=findStrand(sid).color;
const todoRows=sub.todos.map(t=>`<li class="substrand-todo"><input type="checkbox" class="todo-check" ${t.done?'checked':''} onchange="toggleSubTodo(${sid},${sub.id},${t.id})"><label class="todo-label" onclick="toggleSubTodo(${sid},${sub.id},${t.id})">${esc(t.text)}</label><button class="todo-del" onclick="deleteSubTodo(${sid},${sub.id},${t.id})">x</button></li>`).join('');
return `<div class="substrand ${sub.open?'open':''}" id="sub-${sid}-${sub.id}">
<div class="substrand-accent" style="background:${color}88"></div>
<div class="substrand-header" onclick="toggleSub(${sid},${sub.id})">
<div><div class="substrand-title">${esc(sub.title)}</div><div class="substrand-meta">${total?`${done}/${total} done`:'No tasks yet'}</div></div>
<span class="substrand-chevron">&#9658;</span>
</div>
<div class="substrand-body">
<ul class="substrand-todos">${todoRows}</ul>
<div class="substrand-add"><input type="text" id="sst-${sid}-${sub.id}" placeholder="Add task..." onkeydown="if(event.key==='Enter')addSubTodo(${sid},${sub.id})"><button onclick="addSubTodo(${sid},${sub.id})">Add</button></div>
<div class="substrand-del-row"><button class="substrand-del-btn" onclick="deleteSub(${sid},${sub.id})">Delete</button></div>
</div>
</div>`;
}

let dragSrcId=null,touchDragId=null,touchClone=null,touchOffX=0,touchOffY=0;

function initDrag(){
const canvas=document.getElementById('canvas');
canvas.querySelectorAll('.strand').forEach(el=>el.setAttribute('draggable','false'));
canvas.querySelectorAll('.drag-handle').forEach(handle=>{
handle.addEventListener('mousedown',e=>{const card=handle.closest('.strand');card.setAttribute('draggable','true');dragSrcId=parseInt(card.dataset.id);});
handle.addEventListener('touchstart',e=>{
const card=handle.closest('.strand');
touchDragId=parseInt(card.dataset.id);
const touch=e.touches[0];
const rect=card.getBoundingClientRect();
touchOffX=touch.clientX-rect.left;touchOffY=touch.clientY-rect.top;
touchClone=card.cloneNode(true);
touchClone.style.cssText=`position:fixed;z-index:999;width:${rect.width}px;opacity:0.85;pointer-events:none;box-shadow:0 8px 32px rgba(26,18,8,0.25);transform:scale(1.03);transition:none;border-radius:4px;`;
touchClone.style.left=(touch.clientX-touchOffX)+'px';touchClone.style.top=(touch.clientY-touchOffY)+'px';
document.body.appendChild(touchClone);card.classList.add('dragging');e.preventDefault();
},{passive:false});
handle.addEventListener('touchmove',e=>{
if(!touchClone)return;
const touch=e.touches[0];
touchClone.style.left=(touch.clientX-touchOffX)+'px';touchClone.style.top=(touch.clientY-touchOffY)+'px';
touchClone.style.display='none';const el=document.elementFromPoint(touch.clientX,touch.clientY);touchClone.style.display='';
const over=el&&el.closest('.strand[data-id]');
document.querySelectorAll('.strand').forEach(c=>c.classList.remove('drag-over'));
if(over&&parseInt(over.dataset.id)!==touchDragId)over.classList.add('drag-over');
e.preventDefault();
},{passive:false});
handle.addEventListener('touchend',e=>{
if(!touchClone){touchDragId=null;return;}
const touch=e.changedTouches[0];
touchClone.style.display='none';const el=document.elementFromPoint(touch.clientX,touch.clientY);touchClone.style.display='';
const over=el&&el.closest('.strand[data-id]');
if(over){const targetId=parseInt(over.dataset.id);if(targetId!==touchDragId){const si=strands.findIndex(s=>s.id===touchDragId);const ti=strands.findIndex(s=>s.id===targetId);const [moved]=strands.splice(si,1);strands.splice(ti,0,moved);save();}}
touchClone.remove();touchClone=null;touchDragId=null;
document.querySelectorAll('.strand').forEach(c=>c.classList.remove('dragging','drag-over'));
render();
});
});
canvas.addEventListener('dragstart',e=>{const card=e.target.closest('.strand');if(!card)return;dragSrcId=parseInt(card.dataset.id);card.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
canvas.addEventListener('dragend',e=>{canvas.querySelectorAll('.strand').forEach(el=>{el.classList.remove('dragging','drag-over');el.setAttribute('draggable','false');});dragSrcId=null;});
canvas.addEventListener('dragover',e=>{e.preventDefault();const card=e.target.closest('.strand[data-id]');if(!card||parseInt(card.dataset.id)===dragSrcId)return;canvas.querySelectorAll('.strand').forEach(el=>el.classList.remove('drag-over'));card.classList.add('drag-over');});
canvas.addEventListener('drop',e=>{e.preventDefault();const card=e.target.closest('.strand[data-id]');if(!card||!dragSrcId)return;const targetId=parseInt(card.dataset.id);if(targetId===dragSrcId)return;const si=strands.findIndex(s=>s.id===dragSrcId);const ti=strands.findIndex(s=>s.id===targetId);const [moved]=strands.splice(si,1);strands.splice(ti,0,moved);save();render();});
}

function toggleStrand(id){const s=findStrand(id);if(s){s.open=!s.open;save();render();}}
function setTab(id,tab){const s=findStrand(id);if(s){s.activeTab=tab;s.open=true;save();render();}}
function deleteStrand(id){if(confirm('Delete this strand?')){strands=strands.filter(s=>s.id!==id);save();render();}}
function toggleTodo(sid,tid){const s=findStrand(sid);const t=s&&s.todos.find(x=>x.id===tid);if(t){t.done=!t.done;s.open=true;save();render();}}
function deleteTodo(sid,tid){const s=findStrand(sid);if(s){s.todos=s.todos.filter(x=>x.id!==tid);s.open=true;save();render();}}
function addTodo(sid){const el=document.getElementById(`newtodo-${sid}`);const text=el?el.value.trim():'';if(!text)return;const s=findStrand(sid);if(!s)return;s.todos.push({id:uid(),text,done:false});s.open=true;save();render();setTimeout(()=>{const e=document.getElementById(`newtodo-${sid}`);if(e)e.focus();},30);}
function toggleSub(sid,subid){const s=findStrand(sid);const sub=s&&findSub(s,subid);if(sub){sub.open=!sub.open;s.open=true;s.activeTab='subs';save();render();}}
function deleteSub(sid,subid){if(confirm('Delete sub-strand?')){const s=findStrand(sid);if(s){s.subs=s.subs.filter(x=>x.id!==subid);s.open=true;s.activeTab='subs';save();render();}}}
function toggleSubTodo(sid,subid,tid){const s=findStrand(sid);const sub=s&&findSub(s,subid);const t=sub&&sub.todos.find(x=>x.id===tid);if(t){t.done=!t.done;s.open=true;sub.open=true;s.activeTab='subs';save();render();}}
function deleteSubTodo(sid,subid,tid){const s=findStrand(sid);const sub=s&&findSub(s,subid);if(sub){sub.todos=sub.todos.filter(x=>x.id!==tid);s.open=true;sub.open=true;s.activeTab='subs';save();render();}}
function addSubTodo(sid,subid){const key=`sst-${sid}-${subid}`;const el=document.getElementById(key);const text=el?el.value.trim():'';if(!text)return;const s=findStrand(sid);const sub=s&&findSub(s,subid);if(!sub)return;sub.todos.push({id:uid(),text,done:false});s.open=true;sub.open=true;s.activeTab='subs';save();render();setTimeout(()=>{const e=document.getElementById(key);if(e)e.focus();},30);}
function showNewSubForm(sid){const form=document.getElementById(`nsf-${sid}`);const btn=document.getElementById(`nsb-${sid}`);if(form){form.classList.add('visible');btn.style.display='none';}setTimeout(()=>{const e=document.getElementById(`nst-${sid}`);if(e)e.focus();},30);}
function cancelNewSub(sid){const form=document.getElementById(`nsf-${sid}`);const btn=document.getElementById(`nsb-${sid}`);if(form){form.classList.remove('visible');btn.style.display='';}const e=document.getElementById(`nst-${sid}`);if(e)e.value='';}
function confirmNewSub(sid){const el=document.getElementById(`nst-${sid}`);const title=el?el.value.trim():'';if(!title){if(el)el.focus();return;}const s=findStrand(sid);if(!s)return;s.subs.push({id:uid(),title,open:false,todos:[]});s.open=true;s.activeTab='subs';save();render();}
function openModal(){['m-title','m-desc','m-tag'].forEach(id=>document.getElementById(id).value='');document.getElementById('m-status').value='active';selectedColor=COLORS[0];renderColorDots();document.getElementById('modal').classList.add('open');setTimeout(()=>document.getElementById('m-title').focus(),50);}
function closeModal(){document.getElementById('modal').classList.remove('open');}
function closeModalOnOverlay(e){if(e.target.id==='modal')closeModal();}
function renderColorDots(){document.getElementById('color-options').innerHTML=COLORS.map(c=>`<div class="color-dot ${c===selectedColor?'selected':''}" style="background:${c}" onclick="selectColor('${c}')"></div>`).join('');}
function selectColor(c){selectedColor=c;renderColorDots();}
function createStrand(){const title=document.getElementById('m-title').value.trim();if(!title){document.getElementById('m-title').focus();return;}strands.push({id:uid(),title,desc:document.getElementById('m-desc').value.trim(),tag:document.getElementById('m-tag').value.trim()||'General',status:document.getElementById('m-status').value,color:selectedColor,open:true,activeTab:'tasks',todos:[],subs:[]});closeModal();save();render();}

renderColorDots();
load();
render();
</script>
</body>
</html>
